# daloRADIUS operator UI on container port 80.
# HA maps container 80 -> host 8080 (see config.yaml).
<VirtualHost *:80>
    ServerName daloradius.local
    DocumentRoot /var/www/daloradius/app/operators

    DirectoryIndex index.php index.html

    <Directory /var/www/daloradius/app/operators>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Users self-service portal at /users
    Alias /users /var/www/daloradius/app/users
    <Directory /var/www/daloradius/app/users>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block access to sensitive paths
    <DirectoryMatch "^/var/www/daloradius/(app/common|library|setup|contrib)/">
        Require all denied
    </DirectoryMatch>

    # Send logs to stdout/stderr so HA log viewer picks them up
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
